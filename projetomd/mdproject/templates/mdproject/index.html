<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA — Criptografia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>Criptografia RSA</h1>
            <p>Projeto de Matemática Discreta</p>
        </div>

        <div class="card">
            <p class="card-title">Envio de arquivo</p>
            <form method="POST" action="{% url 'mdproject:upload_c_zip' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="field">
                    <label>Arquivo do aluno (menu.c)</label>
                    <input type="file" name="zip_file" accept=".zip">
                </div>
                <button class="btn btn-primary" type="submit">Enviar ZIP</button>
            </form>
            {% if upload_error %}
                <div class="status status-error">{{ upload_error }}</div>
            {% endif %}
            {% if upload_success %}
                <div class="status status-success">{{ upload_success }}</div>
            {% endif %}
        </div>

        <div class="card">
            <p class="card-title">Operações</p>
            <div class="nav-links">
                <a class="nav-link" href="{% url 'mdproject:save' %}">
                    Salvar chave pública
                    <span class="nav-link-arrow">→</span>
                </a>
                <a class="nav-link" href="{% url 'mdproject:crypt' %}">
                    Criptografar mensagem
                    <span class="nav-link-arrow">→</span>
                </a>
                <a class="nav-link" href="{% url 'mdproject:descrypt' %}">
                    Descriptografar mensagem
                    <span class="nav-link-arrow">→</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function generateRandom(inputId) {
            fetch('/mdproject/generate_random/')
            .then(response => response.json())
            .then(data => {
                document.getElementById(inputId).value = data.random_number;
            })
            .catch(error => console.error('Erro:', error));
        }
    </script>
</body>
</html>
