{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA — Criptografia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59,130,246,0.12);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.4);
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); font-size: 15px; line-height: 1.6; min-height: 100vh; }
        .page { max-width: 640px; margin: 0 auto; padding: 48px 24px 80px; }
        .page-header { margin-bottom: 40px; text-align: center; }
        .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; color: var(--text-primary); }
        .page-header p { color: var(--text-secondary); font-size: 14px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); margin-bottom: 20px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
        .field input[type="file"] { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 14px; background: #111; color: var(--text-secondary); outline: none; }
        .field input[type="file"]::file-selector-button { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); border-radius: 5px; padding: 4px 12px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; margin-right: 10px; transition: background 0.15s; }
        .field input[type="file"]::file-selector-button:hover { background: var(--border); }
        .field input[type="file"]::-webkit-file-upload-button { background: var(--surface); color: var(--text-primary); border: 1px solid var(--border); border-radius: 5px; padding: 4px 12px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; margin-right: 10px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 9px 20px; border-radius: 7px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; border: none; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-soft { background: rgba(59,130,246,0.18); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
        .btn-soft:hover { background: rgba(59,130,246,0.28); }
        .nav-links { display: flex; flex-direction: column; gap: 4px; }
        .nav-link { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border: 1px solid var(--border); border-radius: 8px; text-decoration: none; color: var(--text-primary); font-size: 14px; font-weight: 500; background: var(--surface); transition: border-color 0.15s, background 0.15s; }
        .nav-link:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
        .nav-link-arrow { color: var(--text-secondary); font-size: 16px; }
        .status { padding: 10px 14px; border-radius: 7px; font-size: 13px; margin-top: 14px; }
        .status-error { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
        .status-success { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>Criptografia RSA</h1>
        </div>

        <div class="card">
            <p class="card-title">Envio de arquivo</p>
            <form method="POST" action="{% url 'mdproject:upload_c_zip' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="field">
                    <label>Arquivo do aluno (menu.c)</label>
                    <input type="file" name="zip_file" accept=".zip">
                </div>
                <button class="btn btn-soft" type="submit">Enviar ZIP</button>
            </form>
            {% if upload_error %}
                <div class="status status-error">{{ upload_error }}</div>
            {% endif %}
            {% if upload_success %}
                <div class="status status-success">{{ upload_success }}</div>
            {% endif %}
        </div>

        <div class="card">
            <p class="card-title">Operações</p>
            <div class="nav-links">
                <a class="nav-link" href="{% url 'mdproject:save' %}">
                    Salvar chave pública
                    <span class="nav-link-arrow">→</span>
                </a>
                <a class="nav-link" href="{% url 'mdproject:crypt' %}">
                    Criptografar mensagem
                    <span class="nav-link-arrow">→</span>
                </a>
                <a class="nav-link" href="{% url 'mdproject:descrypt' %}">
                    Descriptografar mensagem
                    <span class="nav-link-arrow">→</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
