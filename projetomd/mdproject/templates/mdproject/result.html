{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado — RSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000000; --surface: rgba(6,12,6,0.80); --border: rgba(68,214,44,0.13);
            --border-hover: rgba(68,214,44,0.40); --text-primary: #c8f0c0; --text-secondary: #6aaa5a;
            --accent: #44d62c; --radius: 12px; --mono: 'JetBrains Mono', monospace;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text-primary); font-size: 16px; line-height: 1.6; min-height: 100vh;
            color-scheme: dark;
            background-image: linear-gradient(rgba(68,214,44,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(68,214,44,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .page { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }
        .page-header { margin-bottom: 36px; text-align: center; animation: fadeUp 0.45s ease-out both; }
        .page-header .label { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; opacity: 0.75; }
        .page-header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.4px; color: #e0f5d8; }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; margin-bottom: 16px; backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); transition: border-color 0.2s;
            animation: fadeUp 0.5s ease-out both; animation-delay: 0.12s;
        }
        .card:hover { border-color: var(--border-hover); }
        .result-label { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; display: block; }
        .result-box {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 8px;
            padding: 16px 18px; font-family: var(--mono); font-size: 14px;
            word-break: break-all; line-height: 1.8; color: var(--accent);
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary);
            text-decoration: none; font-family: var(--mono); font-size: 12px; margin-top: 28px;
            transition: color 0.15s; animation: fadeUp 0.5s ease-out both; animation-delay: 0.24s;
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <div class="label">// output</div>
            <h1>Resultado</h1>
        </div>
        <div class="card">
            <span class="result-label">texto_criptografado</span>
            <div class="result-box">{{ encrypted_text }}</div>
        </div>
        <a class="back-link" href="{% url 'mdproject:index' %}">← voltar ao início</a>
    </div>
</body>
</html>
