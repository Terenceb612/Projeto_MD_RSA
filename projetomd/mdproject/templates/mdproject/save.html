{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chave Pública — RSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #888;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.4);
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-primary); font-size: 15px; line-height: 1.6; min-height: 100vh; }
        .page { max-width: 640px; margin: 0 auto; padding: 48px 24px 80px; }
        .page-header { margin-bottom: 40px; text-align: center; }
        .page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
        .page-header p { color: var(--text-secondary); font-size: 14px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
        .field input[type="text"] { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 14px; background: #111; color: var(--text-primary); transition: border-color 0.15s, box-shadow 0.15s; outline: none; }
        .field input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .field input::placeholder { color: #555; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 9px 20px; border-radius: 7px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; border: none; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .form-actions { margin-top: 20px; }
        .status { padding: 10px 14px; border-radius: 7px; font-size: 13px; margin-top: 16px; background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; margin-top: 24px; transition: color 0.15s; }
        .back-link:hover { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <h1>Salvar chave pública</h1>
            <p>Informe os primos e o expoente para gerar a chave</p>
        </div>

        <div class="card">
            <form method="POST" action="{% url 'mdproject:save' %}">
                {% csrf_token %}
                <div class="field">
                    <label for="primo1">Primo 1</label>
                    <input type="text" id="primo1" name="primo1" placeholder="Valor do primeiro primo">
                </div>
                <div class="field">
                    <label for="primo2">Primo 2</label>
                    <input type="text" id="primo2" name="primo2" placeholder="Valor do segundo primo">
                </div>
                <div class="field">
                    <label for="e">Expoente e</label>
                    <input type="text" id="e" name="e" placeholder="Valor de e">
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Salvar chave</button>
                </div>
            </form>
            {% if status %}
                <div class="status">{{ status }}</div>
            {% endif %}
        </div>

        <a class="back-link" href="{% url 'mdproject:index' %}">← Voltar ao início</a>
    </div>
</body>
</html>
