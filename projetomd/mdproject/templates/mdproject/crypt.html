{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Zen+Dots">
        <title>Encriptação</title>
    </head>
    <body>
        <div class="pag">
            <form id="encrypt-form" method="POST" action="{% url 'mdproject:crypt' %}">
                <div class="divsave">
                    {% csrf_token %}
                    <div class="chavep">
                        <h2 class="title"> Vamos encriptar sua mensagem! </h2>
                    </div>
                    <div class="mensagem">
                        <h2 class="mss"> Digite sua mensagem: </h2>
                        <input type="text" id="mensagem" name="mensagem">
                    </div>
                    <div class="chaven">
                        <h2 class="cn"> Chave pública (n) </h2>
                        <input type="text" id="chaven" name="chaven">
                    </div>
                    <div class="chavee">
                        <h2 class="ce"> Chave pública (e) </h2>
                        <input type="text" id="chavee" name="chavee">
                    </div>
                    {% if status %}
                        <label>{{ status }}</label>
                    {% endif %}
                    <button class="botaocrypt" type="submit"> Encriptar </button>
                </div>
            </form>
            <a href="index.html">
                <button class="botaovoltar"> Menu Inicial </button>
            </a>
        </div>
    </body>
</html>
