{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criptografar — RSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000000; --surface: rgba(6,12,6,0.80);
            --border: rgba(68,214,44,0.13); --border-hover: rgba(68,214,44,0.40);
            --text-primary: #c8f0c0; --text-secondary: #6aaa5a;
            --accent: #44d62c; --accent-dim: rgba(68,214,44,0.08); --accent-hover: rgba(68,214,44,0.14);
            --success: #44d62c; --radius: 12px; --mono: 'JetBrains Mono', monospace;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text-primary); font-size: 16px; line-height: 1.6; min-height: 100vh;
            color-scheme: dark;
            background-image: linear-gradient(rgba(68,214,44,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(68,214,44,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .page { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }
        .page-header { margin-bottom: 36px; text-align: center; animation: fadeUp 0.45s ease-out both; }
        .page-header .label { font-family: var(--mono); font-size: 13px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; opacity: 0.75; }
        .page-header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.4px; color: #e0f5d8; }
        

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: border-color 0.2s; animation: fadeUp 0.5s ease-out both;
        }
        .card:hover { border-color: var(--border-hover); }
        .card-title { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 20px; }

        .field { margin-bottom: 18px; }
        .field label { display: block; font-family: var(--mono); font-size: 13px; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 7px; }
        .field input[type="text"] {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
            font-family: var(--mono); font-size: 14px; background: rgba(4,10,4,0.90);
            color: var(--text-primary); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            -webkit-text-fill-color: var(--text-primary); caret-color: var(--accent);
        }
        .field input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(68,214,44,0.10); }
        .field input::placeholder { color: var(--text-secondary); opacity: 0.45; }
        .field input:-webkit-autofill,
        .field input:-webkit-autofill:hover,
        .field input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #040a04 inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
            caret-color: var(--accent);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 22px; border-radius: 8px; font-family: var(--mono); font-size: 13px;
            font-weight: 500; letter-spacing: 0.5px; cursor: pointer;
            transition: background 0.15s, transform 0.1s; border: none;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #5aed42; }
        .form-actions { margin-top: 22px; }

        .status {
            padding: 10px 14px; border-radius: 8px; font-family: var(--mono); font-size: 13px; margin-top: 14px;
            background: rgba(68,214,44,0.08); color: var(--success); border: 1px solid rgba(68,214,44,0.2);
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary);
            text-decoration: none; font-family: var(--mono); font-size: 12px; margin-top: 28px;
            transition: color 0.15s; animation: fadeUp 0.5s ease-out both; animation-delay: 0.30s;
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <div class="label">// cifrar_mensagem()</div>
            <h1>Criptografar</h1>
        </div>

        <div class="card">
                <p class="card-title">// entrada</p>
                <form id="encrypt-form" method="POST" action="{% url 'mdproject:crypt' %}">
                    {% csrf_token %}
                    <div class="field">
                        <label>mensagem</label>
                        <input type="text" id="mensagem" name="mensagem" placeholder="texto a criptografar...">
                    </div>
                    <div class="field">
                        <label>chave_n</label>
                        <input type="text" id="n" name="n" placeholder="valor de n">
                    </div>
                    <div class="field">
                        <label>expoente_e</label>
                        <input type="text" id="e" name="e" placeholder="valor de e">
                    </div>
                    {% if status %}
                        <div class="status">{{ status }}</div>
                    {% endif %}
                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit">Criptografar</button>
                    </div>
                </form>
        </div>

        <a class="back-link" href="{% url 'mdproject:index' %}">← voltar ao início</a>
    </div>
</body>
</html>
